<!DOCTYPE html>
<html>
  <head>
    <title>chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      
      function ChatInput(chatMessages, setChatMessage){

        function saveInputText(event){
          const [inputText, setInputText] = React.useState("");
          setInputText(event.target.value);
        };

        function sendMessage(){
          const newChatMessage = {message: inputText, sender: "user", id: crypto.randomUUID()};
          setChatMessage();

          const response = Chatbot.getResponse(inputText);
          setChatMessage([...newChatMessage, {message: response, sender: "robot", id: crypto.randomUUID()}]);

          setInputText("");
        }

        return (
          <>
            <input placeholder="Send your message to chatbot..." size="30" onChange={saveInputText} value={inputText}/>
            <button onClick={sendMessage}>Send</button>
          </>
        );
      }
      
      function ChatMessage(message, sender, id){
      //const message = props.message;
      //const sender = props.sender;
      //const {sender} = props;
      /*
      if (sender === "robot"){
        return(
          <div>
            <img src="" alt="Chatbot Icon" width="50" height="50"/>
            {message}
          </div>
        )
      };
      */
        return(
          <div>
            {sender ==="robot"&& <img src="" alt="Chatbot Icon" width="50" height="50"/> }
            {message}
            {sender === "user" && <img src="" alt="User Icon" width="50" height="50"/> }

          </div>
        );
      }

      function ChatMessages({chatMessages, setChatMessage}){

        /*function sendMessage(){
         setChatMessage([...chatMessages, {message: "test", sender: "user", id: crypto.randomUUID()}]);
        }
        */
        return ( 
          <>
            {chatMessages.map((chatMessage)=>{return (<ChatMessage message={chatMessage.message} sender={chatMessage.sender} key={chatMessage.id} />);})}
          </>
        );
      }

      function App(){
        const [chatMessages, setChatMessage] = React.useState([
          
          {message: "hello chatbot", sender: "user", id:'id1'},
          {message: "Hello! How can I help you?", sender: "robot", id:'id2'},
          {message: "can you get me todays date?", sender: "user", id:'id3'},
          {message: "Today is September 27, 2023", sender: "robot", id:'id4'}
        ]);
        //const[chatMessages, setChatMessage] = array;
        //const chatMessages = array[0];
        //const setChatMessage = array[1];
        
        return(
          <>
            <ChatInput  chatMessages={chatMessages} setChatMessage={setChatMessage}/>
            <ChatMessages chatMessages={chatMessages}/>
          </>   
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
  <script src="react-basic.js"></script>
</html>
