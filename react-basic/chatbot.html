<!DOCTYPE html>
<html>
  <head>
    <title>chatbot</title>
    <style>
      body{
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        margin-left: 10px;
        border: none;
        font-size: 15px;
        cursor: pointer;

      }

      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

      }

      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }

      .app-container{

        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }

      .chat-message-robot{
        display: flex;
        justify-content: start;
        align-items: start;

      }

      .chat-message-text{
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }

      .chat-message-profile{
        width: 45px;

      }

      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow:scroll;
        scrollbar-width: none
        
      }

    </style>

  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput({ chatMessages, setChatMessage }) {
        const [inputText, setInputText] = React.useState("");

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        function sendMessage() {
          const newChatMessage = {
            message: inputText,
            sender: "user",
            id: crypto.randomUUID()
          };

          const response = Chatbot.getResponse(inputText);

          setChatMessage([
            ...chatMessages,
            newChatMessage,
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID()
            }
          ]);

          setInputText("");
        }

        return (
          <div className="chat-input-container">
            <input
              placeholder="Send your message to chatbot..."
              size="30"
              onChange={saveInputText}
              value={inputText}
              className="chat-input"
            />
            <button onClick={sendMessage} className="send-button">Send</button>
          </div>
        );
      }

      function ChatMessage({ message, sender, id }) {

        

        return (
          <div key={id} className={sender === "user" ? "chat-message-user" : "chat-message-robot"} >
            {sender === "robot" && (
              <img src="robot.png" alt="Chatbot Icon"  className="chat-message-profile"/>
            )}
            <div className="chat-message-text">
              {message}
            </div>
            {sender === "user" && (
              <img src="user.png" alt="User Icon" className="chat-message-profile" />
            )}
          </div>
        );
      }

      function ChatMessages({ chatMessages }) {
        const chatMessageRef = React.useRef(null);


        React.useEffect(() =>{
          const containerElem =chatMessageRef.current;
          if (containerElem){
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);
        return (
          <div className="chat-messages-container" ref={chatMessageRef}>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  key={chatMessage.id}
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  id={chatMessage.id}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        const [chatMessages, setChatMessage] = React.useState([
          { message: "hello chatbot", sender: "user", id: "id1" },
          { message: "Hello! How can I help you?", sender: "robot", id: "id2" },
          { message: "can you get me todays date?", sender: "user", id: "id3" },
          { message: "Today is September 27, 2023", sender: "robot", id: "id4" }
        ]);

        return (
          <div className="app-container">

            <ChatMessages chatMessages={chatMessages} />
            <ChatInput
              chatMessages={chatMessages}
              setChatMessage={setChatMessage}

            />
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
